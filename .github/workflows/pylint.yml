name: Pylint

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analysing the code with pylint
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_PY_FILES="$(git diff --name-only "origin/${{ github.base_ref }}"...${{ github.sha }} -- '*.py')"
        elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
          CHANGED_PY_FILES="$(git ls-files '*.py')"
        else
          CHANGED_PY_FILES="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- '*.py')"
        fi

        if [ -z "${CHANGED_PY_FILES}" ]; then
          echo "No Python files changed; skipping pylint."
          exit 0
        fi

        echo "Running pylint on:"
        echo "${CHANGED_PY_FILES}"
        pylint ${CHANGED_PY_FILES}
