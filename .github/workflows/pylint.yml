name: Pylint

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analysing the code with pylint
      run: |
        mapfile -d '' -t CHANGED_PY_FILES < <(
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only -z "origin/${{ github.base_ref }}"...${{ github.sha }} -- ':(glob)**/*.py'
        elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
          git ls-files -z -- ':(glob)**/*.py'
        else
          git diff --name-only -z "${{ github.event.before }}" "${{ github.sha }}" -- ':(glob)**/*.py'
        fi
        )

        if [ ${#CHANGED_PY_FILES[@]} -eq 0 ]; then
          echo "No Python files changed; skipping pylint."
          exit 0
        fi

        echo "Running pylint on:"
        printf '%s\n' "${CHANGED_PY_FILES[@]}"
        pylint "${CHANGED_PY_FILES[@]}"
